sonar.projectKey=kazuma-desu_etcd-compass
sonar.organization=kazuma-desu
sonar.projectName=etcd-compass

sonar.sources=src,src-tauri/src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
sonar.exclusions=src-tauri/target/**,node_modules/**,dist/**,coverage/**
sonar.coverage.exclusions=\
  src/components/ui/**,\
  src/app/App.css,\
  src/index.css,\
  src/features/keys/JsonViewer.tsx,\
  src/features/keys/ImportPreviewDialog.tsx,\
  src/features/cluster/ClusterStatus.tsx,\
  src/features/cluster/MetricsDashboard.tsx,\
  src/features/leases/LeasePanel.tsx,\
  src/features/watch/WatchPanel.tsx,\
  src/features/connections/ConnectionForm.tsx,
  src/shared/components/CommandPalette.tsx,
  src/shared/components/ConnectionStatus.tsx,
  src/shared/components/ShortcutHelp.tsx,
  src/shared/components/TabBar.tsx,
  src/shared/hooks/use-keyboard-shortcuts.ts,
  src/features/keys/KeyDetail.tsx,
  src/features/keys/TreeView.tsx,
  src/features/cluster/ClusterSidebar.tsx,
  src/app/AppShell.tsx,
  src-tauri/src/main.rs

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.rust.lcov.reportPaths=backend-coverage/lcov.info
sonar.rust.clippy.enabled=false

sonar.testExecutionReportPaths=test-results/junit.xml,backend-test-results/junit.xml
sonar.externalIssuesReportPaths=security/npm-audit.sarif,security/cargo-audit.sarif

sonar.sourceEncoding=UTF-8
