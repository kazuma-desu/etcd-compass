name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  NODE_VERSION: "24"
  RUST_VERSION: "1.92.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: |
          npm audit --audit-level=high --omit=dev --json > npm-audit.json || true
          npx --yes npm-audit-sarif npm-audit.json -o npm-audit.sarif

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev protobuf-compiler

      - name: Cache Rust
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit --format sarif > cargo-audit.sarif || true

      - name: Install Betterleaks
        run: |
          curl -sSL -o betterleaks_1.1.2_linux_x64.tar.gz "https://github.com/betterleaks/betterleaks/releases/download/v1.1.2/betterleaks_1.1.2_linux_x64.tar.gz"
          curl -sSL -o checksums.txt "https://github.com/betterleaks/betterleaks/releases/download/v1.1.2/checksums.txt"
          sha256sum -c checksums.txt --ignore-missing
          tar xzf betterleaks_1.1.2_linux_x64.tar.gz
          sudo mv betterleaks /usr/local/bin/
          betterleaks version

      - name: Secret detection
        run: betterleaks git . -v --git-workers=4

      - name: Upload security SARIF reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-sarif
          path: |
            npm-audit.sarif
            src-tauri/cargo-audit.sarif
          retention-days: 1

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: Typecheck
        run: npm run typecheck

  frontend-test:
    name: Frontend Test
    needs: [frontend-lint]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: coverage/lcov.info
          retention-days: 1

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-test-results
          path: test-results/junit.xml
          retention-days: 1

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev protobuf-compiler

      - name: Cache Rust
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir -p dist

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  backend-test:
    name: Backend Test
    needs: [frontend-lint, backend-lint]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev protobuf-compiler

      - name: Cache Rust
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri

      - name: Create frontend dist stub
        run: mkdir -p dist

      - name: Verify Docker is available
        run: docker ps

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked --version 0.9.133

      - name: Run all backend tests with JUnit output
        working-directory: src-tauri
        run: cargo nextest run --profile ci

      - name: Upload backend test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-test-results
          path: src-tauri/target/nextest/ci/junit.xml
          retention-days: 1

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked --version 0.8.4

      - name: Run all backend tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload backend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage
          path: src-tauri/lcov.info
          retention-days: 1

  e2e-test:
    name: E2E Test
    needs: [frontend-lint, backend-lint]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev protobuf-compiler

      - name: Cache Rust
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri

      - name: Verify Docker is available
        run: docker ps

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-@playwright/test-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  sonar:
    name: SonarCloud Analysis
    needs: [security, frontend-test, backend-test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-coverage
          path: coverage

      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-coverage
          path: backend-coverage

      - name: Download frontend test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-test-results
          path: test-results

      - name: Download backend test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: backend-test-results
          path: backend-test-results

      - name: Download security SARIF reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: security-sarif
          path: security

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build (${{ matrix.platform }})
    needs: [security, frontend-test, backend-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-24.04
            rust-targets: ""
            tauri-args: ""
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust-targets: ""
            tauri-args: ""
          - platform: macos
            runner: macos-14
            rust-targets: "x86_64-apple-darwin aarch64-apple-darwin"
            tauri-args: "--target universal-apple-darwin"
          - platform: windows-amd64
            runner: windows-latest
            rust-targets: ""
            tauri-args: ""
          - platform: windows-arm64
            runner: windows-latest
            rust-targets: "aarch64-pc-windows-msvc"
            tauri-args: "--target aarch64-pc-windows-msvc"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.rust-targets }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev build-essential libssl-dev libgtk-3-dev libappindicator3-dev librsvg2-dev protobuf-compiler

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PROTOC_VERSION: "29.3"
        run: |
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v${env:PROTOC_VERSION}/protoc-${env:PROTOC_VERSION}-win64.zip"
          $zip = "$env:RUNNER_TEMP\protoc.zip"
          $dest = "$env:RUNNER_TEMP\protoc"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          echo "$dest\bin" >> $env:GITHUB_PATH
          & "$dest\bin\protoc.exe" --version

      - name: Set up MSVC for ARM64 cross-compilation
        if: matrix.platform == 'windows-arm64'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0
        with:
          arch: amd64_arm64

      - name: Cache Rust
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build ${{ matrix.tauri-args }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: etcd-compass-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 7
